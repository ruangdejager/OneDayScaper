# fly.toml app configuration file generated for onedayonly-bot on 2026-04-29T10:46:14+02:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'onedayonly-bot'
primary_region = 'jnb'

[build]

[env]
  DATABASE_PATH = '/data/subscriptions.db'

[processes]
  app = 'python bot.py'

[[mounts]]
  source = 'sqlite_data'
  destination = '/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'
